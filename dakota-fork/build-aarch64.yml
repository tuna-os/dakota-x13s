# Additions to projectbluefin/dakota .github/workflows/build.yml
# to publish an aarch64 image alongside the existing x86_64 build.
#
# PR this into upstream dakota, or keep in a fork with the full build.yml
# that adds this job.

name: Build Bluefin dakota (aarch64)

on:
  schedule:
    - cron: '0 13 * * *'
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: projectbluefin/dakota

jobs:
  # ── aarch64 native build on GitHub's arm64 runners ───────────────────────
  # BuildStream pulls pre-built aarch64 artifacts from GNOME's build cache
  # (gbm.gnome.org), so most elements are cache hits rather than native builds.
  build-aarch64:
    runs-on: ubuntu-24.04-arm   # GitHub's native arm64 runner
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up BTRFS storage
        run: |
          sudo mkfs.btrfs -L btrfs-storage \
            /dev/disk/by-id/$(ls /dev/disk/by-id | grep -v part | tail -1)
          sudo mount /var/lib/containers
          df -h

      - name: Generate BuildStream config
        run: |
          cat > ci.conf << 'EOF'
          fetchers: 16
          builders: 4
          network-retries: 5
          retry-failed: true
          EOF

      - name: Build OCI image (aarch64)
        timeout-minutes: 300
        run: |
          docker run --privileged \
            -v /var/lib/containers:/var/lib/containers \
            -v $PWD:/build \
            -w /build \
            ghcr.io/projectbluefin/buildstream:latest \
            bst --option arch aarch64 build oci/bluefin.bst --config ci.conf

      - name: Push aarch64 tag to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login -u "${{ github.actor }}" --password-stdin ghcr.io
          docker push ghcr.io/${{ env.IMAGE_NAME }}:aarch64
          docker push "ghcr.io/${{ env.IMAGE_NAME }}:aarch64-${{ github.sha }}"

  # ── Combine x86_64 + aarch64 into a multi-arch manifest ─────────────────
  # Run after both arch jobs complete. Needs the x86_64 job from the main
  # build.yml to be named `build` and to have already pushed :latest.
  create-manifest:
    runs-on: ubuntu-24.04
    needs: [build-aarch64]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create ghcr.io/${{ env.IMAGE_NAME }}:latest \
            ghcr.io/${{ env.IMAGE_NAME }}:latest \
            ghcr.io/${{ env.IMAGE_NAME }}:aarch64
          docker manifest push ghcr.io/${{ env.IMAGE_NAME }}:latest
