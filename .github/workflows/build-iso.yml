name: Build dakota-x13s Live ISO

on:
  push:
    branches: [main]
    paths:
      - 'iso/**'
      - 'justfile'
      - '.github/workflows/build-iso.yml'
  schedule:
    # Daily after bootc image build (offset by 3h)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip R2 upload)'
        required: true
        default: 'false'
        type: boolean

concurrency:
  group: iso-build-${{ github.ref }}
  cancel-in-progress: false

env:
  INSTALLER_IMAGE: ghcr.io/${{ github.repository_owner }}/x13s-installer

jobs:
  build-installer:
    name: Build installer container
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet' '^mysql' '^postgresql' '^ghc' \
            '^libgcc-' '^libstdc' '^llvm' 'php.*' '^ruby' '^gcc-' '^cpp-' || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/local/share/powershell \
            /usr/share/doc \
            /usr/share/man
          df -h

      - name: Install dependencies
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | bash -s -- --to /usr/local/bin
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull installer cache
        run: |
          sudo podman pull "${{ env.INSTALLER_IMAGE }}:cache" || true
          sudo podman tag "${{ env.INSTALLER_IMAGE }}:cache" localhost/x13s-installer:latest 2>/dev/null || true

      - name: Build installer container
        run: |
          sudo just \
            installer_channel=dev \
            container

      - name: Push installer to GHCR
        run: |
          sudo podman tag localhost/x13s-installer "${{ env.INSTALLER_IMAGE }}:${{ github.sha }}"
          sudo podman tag localhost/x13s-installer "${{ env.INSTALLER_IMAGE }}:cache"
          sudo podman push "${{ env.INSTALLER_IMAGE }}:${{ github.sha }}"
          sudo podman push "${{ env.INSTALLER_IMAGE }}:cache"

  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04-arm
    needs: build-installer
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet' '^mysql' '^postgresql' '^ghc' \
            '^libgcc-' '^libstdc' '^llvm' 'php.*' '^ruby' '^gcc-' '^cpp-' || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/local/share/powershell \
            /usr/share/doc \
            /usr/share/man
          df -h

      - name: Install dependencies
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | bash -s -- --to /usr/local/bin
          sudo apt-get update
          sudo apt-get install -y podman rclone mtools xorriso squashfs-tools dosfstools

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull installer image
        run: |
          sudo podman pull "${{ env.INSTALLER_IMAGE }}:${{ github.sha }}"
          sudo podman tag "${{ env.INSTALLER_IMAGE }}:${{ github.sha }}" localhost/x13s-installer

      - name: Build ISO
        run: |
          echo "=== df at start of ISO build ===" && df -h
          sudo just \
            installer_channel=dev \
            skip_build=1 \
            output_dir=output \
            iso-sd-boot
          sudo chown -R "$(id -u):$(id -g)" output
          echo "=== df after ISO build ===" && df -h

      - name: Generate checksums
        run: |
          cd output
          DATESTAMP=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATED="x13s-live-${DATESTAMP}-${SHORT_SHA}"
          sha256sum x13s-live.iso > CHECKSUMS.txt
          cp CHECKSUMS.txt CHECKSUMS-latest.txt
          sed -i "s/x13s-live\.iso/${DATED}.iso/g" CHECKSUMS.txt
          mv x13s-live.iso "${DATED}.iso"
          echo "ISO_NAME=${DATED}.iso" >> "$GITHUB_ENV"

      - name: Upload to R2
        if: github.event_name != 'pull_request' && !inputs.dry_run
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="${{ secrets.R2_BUCKET }}"
          rclone copyto --s3-no-check-bucket \
            "output/${{ env.ISO_NAME }}" \
            "R2:${BUCKET}/dakota-x13s/${{ env.ISO_NAME }}"
          rclone copyto --s3-no-check-bucket \
            "output/${{ env.ISO_NAME }}" \
            "R2:${BUCKET}/dakota-x13s/x13s-live-latest.iso"
          rclone copyto --s3-no-check-bucket \
            output/CHECKSUMS.txt \
            "R2:${BUCKET}/dakota-x13s/CHECKSUMS.txt"
          rclone copyto --s3-no-check-bucket \
            output/CHECKSUMS-latest.txt \
            "R2:${BUCKET}/dakota-x13s/CHECKSUMS-latest.txt"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dakota-x13s-iso
          path: |
            output/x13s-live*.iso
            output/CHECKSUMS*.txt
          retention-days: 7
